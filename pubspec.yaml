name: edge_gen_ai
description: "A Flutter plugin for on-device generative AI, using Apple's Foundation Models (iOS) and Gemini Nano via ML Kit GenAI (Android)."
version: 0.1.1
homepage: https://github.com/manukj/EdgeAi
repository: https://github.com/manukj/EdgeAi

environment:
  sdk: ^3.11.1
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  meta: ^1.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  pigeon: ^27.1.0


flutter:
  plugin:
    platforms:
      android:
        package: com.manukj.edge_gen_ai
        pluginClass: EdgeGenAIPlugin
      ios:
        pluginClass: EdgeGenAIPlugin
